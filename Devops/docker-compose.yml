services:
  nginx:
    image: nginx:alpine
    ports: ["8080:80"]
    volumes:
      - ../:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on: [php]
    networks: [app]

  php:
    build:
      context: ../
      dockerfile: devops/Dockerfile.php
    volumes: ["../:/var/www/html"]
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
    networks: [app]

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: secret
    volumes: [mysql_data:/var/lib/mysql]
    networks: [app]

  redis:
    image: redis:alpine
    networks: [app]

  queue:
    build:
      context: ../
      dockerfile: devops/Dockerfile.php
    command: php artisan queue:work --sleep=3 --tries=3
    volumes: ["../:/var/www/html"]
    depends_on: [mysql, redis]
    networks: [app]

networks:
  app:
    name: app_network

volumes:
  mysql_data: