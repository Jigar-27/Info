global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: laravel
    static_configs:
      - targets: ['php:9000']
    metrics_path: /metrics

  - job_name: nginx
    static_configs:
      - targets: ['nginx:80']
    metrics_path: /metrics

  - job_name: mysql
    static_configs:
      - targets: ['mysql:3306']

  - job_name: redis
    static_configs:
      - targets: ['redis:6379']